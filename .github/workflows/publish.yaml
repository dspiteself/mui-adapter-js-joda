name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

# `id-token: write` — OIDC token for Trusted Publishing + provenance.
# `contents: write` — `gh release create` at the end of the job.
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          # NOTE: deliberately not setting `registry-url`. That option makes
          # setup-node write `.npmrc` with `_authToken=${NODE_AUTH_TOKEN}` and
          # injects a placeholder token, which then short-circuits Trusted
          # Publishing's OIDC exchange and 404s with an auth error.

      # Trusted Publishing needs the OIDC-aware npm CLI; Node 22 ships with
      # npm 10.x which predates it. Pinning to a known-good range.
      - run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        # Refuse to publish if someone pushes `v0.2.0` but package.json still
        # says 0.1.0 — that would publish the wrong version and the tag would
        # be permanently misleading.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag and package.json both say $PKG ✓"

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # No token needed — Trusted Publishing exchanges the GitHub OIDC token
      # (available because `id-token: write` is granted above) for a short-
      # lived npm publish token. Requires a trusted publisher to be configured
      # for this package on npmjs.com pointing at this repo + workflow file.
      - name: Publish to npm
        run: npm publish --provenance --access public

      # Create a GitHub Release on the same tag, with autogenerated notes
      # ("What's Changed" diff against the previous release tag). Runs only
      # after the publish succeeds, so a release on GitHub always implies a
      # corresponding npm version.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
