name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

# Required for `npm publish --provenance` (OIDC token to sign the build
# attestation) and for `contents: read` to check out the tag.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing needs the OIDC-aware npm CLI; Node 22 ships with
      # npm 10.x which predates it. Pinning to a known-good range.
      - run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        # Refuse to publish if someone pushes `v0.2.0` but package.json still
        # says 0.1.0 — that would publish the wrong version and the tag would
        # be permanently misleading.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag and package.json both say $PKG ✓"

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # No token needed — Trusted Publishing exchanges the GitHub OIDC token
      # (available because `id-token: write` is granted above) for a short-
      # lived npm publish token. Requires a trusted publisher to be configured
      # for this package on npmjs.com pointing at this repo + workflow file.
      - name: Publish to npm
        run: npm publish --provenance --access public
